<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position property</title>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .box {
        height: 433px;
        width: 80vw;
        margin: 3px;
        padding: 3px;
        border: 2px solid black;
      }
      .box1 {
        background: #981616;
        position: static;
        top: 0px;
        height: 111px;
        width: 100%;
        margin: 0;
        padding: 0;
        z-index: 1;

        /* position: absolute;
  top: 0px;
  left: 2px; */
      }

      .box2 {
        background-color: aquamarine;
        position: relative;
        z-index: 2;
        /* height: 111px; */
      }

      .box3 {
        background-color: blue;
        position: fixed;
        z-index: 34;
        /* bottom: 0px;
        left: 5vw; */

        height: 111px;
      }

      .box4 {
        background-color: brown;
      }

      /* tramnsform filter oor persective 
      properties can also make an ellement appear  as positiond  */
      .parent {
        padding: 43px;
        margin: 33px;
        border: 4px solid blue;
        /* position: relative; */
        position: absolute;
      /* transform: translate(0); */
      /* filter: invert(); */
      /* perspective: 0em; */
      }
    </style>
  </head>

  <body>
    <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
  </body>
</html>
