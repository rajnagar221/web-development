<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        background-color: rgb(111, 236, 111);
        height: 40vh;
        width: 30vw;
      }
      .box {
        width: 84px;
        height: 75px;
        background-color: rgb(0, 119, 119);
        animation: animation;
        /* animation ka duration time h jo 1second h tk chalega animtion 1sec m animation complete  */
        /* animation-duration: 1s; */

        /* animation ko kitne time chalna h abhi infinite h toh chalta hi rhega  */
        /* animation-iteration-count: infinite; */

        /* animation fast slow jesa bhi krna ho apne according  */
        /* animation-timing-function: cubic-bezier(1, 0, 0, 1); */

        /* animation delay ka mtlb hota h kitna delay krna apneko 3s ka h uske baad animation start hoga  */
        /* animation-delay: 3s; */

        /* abb animation ki direction change ho jayegi reverse chalega nimtion */
        /* animation-direction: reverse; */

        /* animation short hand  */
        animation:
          animation 3s ease-in-out 3s 1 backwards,
          animation2 3s ease-in-out 3s 1 forwards;
      }
      @keyframes animation {
        from {
          background-color: red;
        }
        to {
          background-color: blue;
          transform: translateX(1000px);
        }
      }

      @keyframes animation2 {
        10% {
          transform: rotate(100deg);
        }
        20% {
          transform: rotate(200deg);
        }
        50% {
          transform: rotate(250deg);
        }
        80% {
          transform: rotate(280deg);
        }
        100% {
          transform: rotate(310deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">box</div>
    </div>
  </body>
</html>
