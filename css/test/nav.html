<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav baar</title>
    <style>
      .logo img {
        width: 164px;
      }

      nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .right ul {
        display: flex;
        gap: 34px;
      }

      .right ul li {
        list-style: none;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      .right ul li span {
        padding: 0 5px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="Screenshot 2026-03-12 220129.png" alt="" />
      </div>

      <div class="right">
        <ul>
          <li><span> product ↓ </span></li>
          <li><span> pricing ↓ </span></li>
          <li><span> resources ↓</span></li>
          <li><span> About us ↓ </span></li>
        </ul>
      </div>
    </nav>
  </body>
</html>
