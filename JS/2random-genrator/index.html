<body>
    <script>
        let rand = Math.random()
        let first , second , third;

        if(rand<=0.33){
            first = "crazy"
        }

        else if(rand<0.66 && rand>=0.33){
           first ="amazing"
        }   

        else{
            first = "fire "
        }


        if(rand<=0.33){
            second = "crazy"
        }

        else if(rand<0.66 && rand>=0.33){
           second ="amazing"
        }

        else{
            second = "fire "
        }


        if(rand<=0.33){
            third = "crazy"
        }

        else if(rand<0.66 && rand>=0.33){
           third ="amazing"
        }

        else{
            third = "fire "
        }

        console.log(`${first} ${second} ${third}`)

    </script></body>
