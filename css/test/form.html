<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Example</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
      }

      /* Container center me content rakhta hai */
      .container {
        width: 90%;
        max-width: 800px;
        margin: auto;
      }

      /* Section spacing */
      .section {
        padding: 60px 0;
      }

      /* Form design */
      .form-box {
        background: white;
        padding: 30px;
        border-radius: 8px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        background: #3498db;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #2980b9;
      }
    </style>
  </head>

  <body>
    <!-- FORM SECTION -->
    <section class="section">
      <div class="container">
        <h2>Student Registration Form</h2>
        <p>This section shows how HTML forms work.</p>

        <div class="form-box">
          <form action="#" method="post">
            <!-- Name -->
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your name"
              />
            </div>

            <!-- Email -->
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
              />
            </div>

            <!-- Password -->
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" />
            </div>

            <!-- Gender -->
            <div class="form-group">
              <label>Gender</label>
              <input type="radio" name="gender" /> Male
              <input type="radio" name="gender" /> Female
            </div>

            <!-- Course -->
            <div class="form-group">
              <label for="course">Select Course</label>
              <select id="course" name="course">
                <option>Web Development</option>
                <option>Data Science</option>
                <option>Graphic Design</option>
              </select>
            </div>

            <!-- Message -->
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" rows="4"></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit">Submit Form</button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
