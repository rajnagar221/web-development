<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS grid</title>

    <style>
      .container {
        /* display: flex; */
        width: 80vw;
        height: 100vh;
        border: 2px solid rgb(0, 0, 0);
        display: grid;
        /* grid-template-columns: 120px 100px;
        grid-template-rows: 100px 100px 100px; */
        row-gap: 10px;

        /* grid-template-columns: 1fr 2fr 3fr; */
        /* grid-template-columns: repeat(4 , minmax(100px 1fr)); */
        grid-template-columns: repeat(4 , 44px);
        /* gap: 34px; */
        column-gap: 44px;
        justify-items: center;
        align-items: center;
      }
      .item {
        border: 2px solid rgb(175, 26, 26);
        height: 55px;
        width: 55px;
      }

      /* .item-4 {
         isme esa hoga 1 box  se 2 box tk ki jagh lega  
        grid-row: 1/2;
        grid-column: 1/2;
      }

      .item-1 {
        grid-row-start: 1;
        grid-row-end: 2;
        /* grid-row: 1/2;
        isme esa hoga 1 box  se 3 box tk ki jagh lega 
        grid-column: 1/3; 
      } */
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
      </div>
    </main>
  </body>
</html>
