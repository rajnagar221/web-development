<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>overflow properties</title>
    <style>
      .box {
        width: 40vw;
        height: 30vh;
        border: 2px solid black;
        overflow-y: hidden;
        overflow-x: hidden;
        overflow: scroll;
        white-space: nowrap;
        /* overflow: hidden; */
      }
    </style>
  </head>
  <body>
    <div class="box">
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quia magnam
      repellat perspiciatis dignissimos? Cupiditate, suscipit praesentium harum
      maxime totam eligendi excepturi odit quasi soluta iusto fugiat optio aut
      velit et?
    </div>
  </body>
</html>
