<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>card design</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        height: 555px;
        width: 22%;
        margin: 90px;
        border: 2px solid black;
        border-radius: 18px;
      }
      img {
        height: auto;
        left: auto;
        width: 100%;
        border-radius: 23px;
      }
      span {
        display: inline-block;
        margin: 4%;
        padding: 2%;
        width: 3vw;
        height: 20px;
        border: 2px solid rgb(0, 0, 0);
        border-radius: 29px;
        box-shadow: 0px 0px 6px inset rgb(14, 14, 14);
        filter: blur(0px);
      }
      span1 {
        display: inline-block;
        margin: 4%;
        padding: 2%;
        width: 40px;
        height: 20px;
        border: 2px solid rgb(0, 0, 0);
        border-radius: 29px;
        box-shadow: 0px 0px 7px inset rgb(14, 14, 14);
      }
      h1 {
        margin: 4%;
      }
      p {
        margin: 4%;
      }
       .read {
        display: block;
        width: 120px;
        margin: 20px auto;
        padding: 10px;
        text-align: center;
        background: #00bcd4;
        color: white;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
      }

      /* Hover effect */
      .read:hover {
        background: #0097a7;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img src="Screenshot 2026-03-07 032444.png" alt="ss" />
      <span> Nature </span>
      <span1> Lake </span1>
      <h1>Lago di Braies</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sit, itaque
        soluta dolorem voluptates blanditiis dicta odit cumque! Fugiat laborum
        quas dolorem veniam iste. Iusto sapiente neque eveniet doloremque maxime
        ipsum.
      </p>
      <div class="read">Read More</div>
    </div>
  </body>
</html>
