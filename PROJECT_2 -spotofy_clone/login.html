<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>musify - Professional Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

    <link

    />
    <link

      rel="stylesheet"
    />
    <script id="tailwind-config">

              error: "#ba1a1a",
              surface: "#f8f9ff",
              "outline-variant": "#c8c5d0",
              "on-tertiary-fixed": "#171c25",
              "on-primary-fixed": "#181445",
              outline: "#787680",
              "surface-container-high": "#dce9ff",
              "on-secondary-container": "#fffbff",
              "surface-container-highest": "#d3e4fe",
              "on-tertiary-container": "#848995",
              background: "#f8f9ff",
              "error-container": "#ffdad6",

              "container-max": "440px",
              "stack-sm": "8px",
              unit: "8px",
              "padding-input": "12px 16px",
              "stack-lg": "32px",
            },
            fontFamily: {

              "label-bold": ["Manrope"],
              "body-lg": ["Manrope"],
              "body-md": ["Manrope"],

              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .bg-pattern {
        background-color: #f8f9ff;
        background-image: radial-gradient(#6063ee 0.5px, transparent 0.5px);
        background-size: 24px 24px;
        opacity: 0.05;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden"
  >
    <div class="fixed inset-0 z-0 bg-pattern"></div>
    <div
      class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full z-0"
    ></div>
    <div
      class="fixed bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary/10 blur-[100px] rounded-full z-0"
    ></div>
    <header
      class="fixed top-0 w-full z-50 bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 shadow-[0_1px_3px_rgba(30,27,75,0.05)]"
    >
      <div
        class="flex items-center justify-between px-6 h-16 max-w-[440px] mx-auto"
      >
        <div class="flex items-center gap-2">
          <span
            class="text-xl font-extrabold tracking-tighter text-indigo-950 dark:text-white"
            >musify</span
          >
        </div>
      </div>
    </header>
    <main style="margin-top: 8rem;" class="z-10 w-full max-w-[440px] px-6 mt-16">
      <div
        class="bg-surface-container-lowest border border-surface-container shadow-[0_10px_25px_-5px_rgba(30,27,75,0.1)] rounded-xl p-8 flex flex-col gap-stack-lg"
      >
        <div class="flex flex-col gap-stack-sm text-center">
          <h1 class="font-headline-lg text-headline-lg text-primary">
            Welcome back
          </h1>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Access your secure workspace and managed identities.
          </p>
        </div>
        <form class="flex flex-col gap-stack-md">
          <div class="flex flex-col gap-unit">
            <label
              class="font-label-bold text-label-bold text-outline uppercase"
              >Email Address</label
            >
            <div class="relative group">
              <input
                class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all duration-200 cubic-bezier(0.4,0,0.2,1)"
                placeholder="name@gmail.com"
                type="email"
              />
            </div>
          </div>
          <div class="flex flex-col gap-unit">
            <div class="flex justify-between items-center">
              <label
                class="font-label-bold text-label-bold text-outline uppercase"
                >Password</label
              >
              <a
                class="font-label-bold text-label-bold text-on-secondary-fixed-variant hover:opacity-80 transition-opacity"
                href="#"
                >Forgot password?</a
              >
            </div>
            <div class="relative group">
              <input
                class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all duration-200 cubic-bezier(0.4,0,0.2,1)"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <button
            class="mt-4 w-full bg-primary text-on-primary font-button-text text-button-text py-4 rounded-lg shadow-lg hover:bg-secondary active:scale-95 transition-all duration-200 cubic-bezier(0.4,0,0.2,1)"
            type="submit"
          >
            Login to musify
          </button>
        </form>
        <div class="flex items-center gap-4">
          <div class="h-[1px] bg-outline-variant flex-grow"></div>
          <span
            class="font-label-bold text-label-bold text-outline uppercase whitespace-nowrap"
            >Or sign in with</span
          >
          <div class="h-[1px] bg-outline-variant flex-grow"></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <button
            class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-200"
          >
            <img
              alt="Google Logo"
              class="w-5 h-5"
              data-alt="Official Google icon with red, yellow, green, and blue segments on a white background"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjKjsd4UiNK-qRj-pEmrsyuoSB-_aA0YQkab--TXOdbFkgetUvMZkcdqVlP-FRXOGHO6P-5U2Pm4Ck9rUCzXXxy7cfBuKK-JkkhE0cOtt2kBUbbxNCZILSvOw-W2VTAAhkCVRCXWhDvHRqt_jjZ9Ljpu10sUnJPClquUDTR6XTUPXZxBEptCa0Kke05KH_OQtt2E5VIsVeXgrXbpi0-sxfIfdQMShY6yowW75VDnvg916xXwSbvwsJtTy46dBWxorK67TpcF2qVkc"
            />
            <span class="font-button-text text-button-text text-on-surface"
              >Google</span
            >
          </button>
          <button
            class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-200"
          >
            <span
              class="material-symbols-outlined text-xl"
              data-icon="apple"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >ios</span
            >
            <span class="font-button-text text-button-text text-on-surface"
              >Apple</span
            >
          </button>
        </div>
        <div class="text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Don't have an account?
            <a
              class="font-button-text text-on-secondary-fixed-variant hover:opacity-80 transition-opacity"
              href="#"
              >Create Account</a
            >
          </p>
        </div>
      </div>
    </main>
    <footer
      class="w-full py-8 mt-auto flex flex-col items-center space-y-4 px-8 text-center bg-transparent"
    >
      <div class="flex items-center gap-6">
        <a
          class="font-['Manrope'] text-[11px] font-medium leading-relaxed text-slate-400 dark:text-slate-600 hover:text-indigo-900 dark:hover:text-indigo-200 transition-colors"
          href="#"
          >Privacy Policy</a
        >
        <a
          class="font-['Manrope'] text-[11px] font-medium leading-relaxed text-slate-400 dark:text-slate-600 hover:text-indigo-900 dark:hover:text-indigo-200 transition-colors"
          href="#"
          >Terms of Service</a
        >
        <a
          class="font-['Manrope'] text-[11px] font-medium leading-relaxed text-slate-400 dark:text-slate-600 hover:text-indigo-900 dark:hover:text-indigo-200 transition-colors"
          href="#"
          >Help Center</a
        >
      </div>
      <p
        class="font-['Manrope'] text-[11px] font-medium leading-relaxed text-slate-400 dark:text-slate-600"
      >
        © 2026 musify Corporation
      </p>
    </footer>
  </body>
</html>
