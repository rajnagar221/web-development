<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header style="background-color: #36373c;" class="fixed top-0 w-full z-50 bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 shadow-[0_1px_3px_rgba(30,27,75,0.05)]">

</div>
<nav class="flex gap-4">

</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center w-full px-6 pt-24 pb-12">
<div class="w-full max-w-[440px]">
<!-- Auth Card -->
<div class="auth-card bg-surface-container-lowest p-8 rounded-xl border border-outline-variant/30">
<!-- Heading Section -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure your digital identity in just a few steps.</p>
</div>
<!-- Registration Form -->
<form class="space-y-stack-md">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-primary uppercase" for="full_name">Full Name</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all duration-200 placeholder:text-outline" id="full_name" name="full_name" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-primary uppercase" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all duration-200 placeholder:text-outline" id="email" name="email" placeholder="name@gmail.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-primary uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all duration-200 placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-secondary border-outline-variant rounded focus:ring-secondary transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                            I agree to the <a class="text-secondary font-semibold hover:underline" href="#">Terms and Conditions</a> and <a class="text-secondary font-semibold hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-primary text-white font-button-text text-button-text py-4 rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Social Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-3 font-label-bold text-label-bold text-outline uppercase">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Auth -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors" type="button">

<span class="font-button-text text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-button-text text-on-surface">Apple</span>
</button>
</div>
</form>
<!-- Login Redirect -->
<div class="mt-8 text-center border-t border-outline-variant/30 pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-secondary font-bold hover:underline transition-all" href="#">Log In</a>
</p>

<a class="font-['Manrope'] text-[11px] font-medium leading-relaxed text-slate-400 dark:text-slate-600 hover:text-indigo-900 dark:hover:text-indigo-200 transition-colors" href="#">Help Center</a>
